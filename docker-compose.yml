
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: noma
      POSTGRES_PASSWORD: nomapassword
      POSTGRES_DB: nomadb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - noma-network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - noma-network

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - noma-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://noma:nomapassword@postgres:5432/nomadb
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_super_secret_jwt_key
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - postgres
      - redis
    networks:
      - noma-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000/collaboration
    depends_on:
      - api
    networks:
      - noma-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  noma-network:
    driver: bridge
